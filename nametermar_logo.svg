<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- name tag body -->
  <rect x="10" y="25" width="80" height="50" rx="10" ry="10"
    fill="none" stroke="#ff8c42" stroke-width="3"/>
  <!-- tag hole -->
  <circle cx="50" cy="18" r="5" fill="none" stroke="#ff8c42" stroke-width="2"/>
  <!-- N letter -->
  <line x1="28" y1="58" x2="28" y2="42" stroke="#ff3c7f" stroke-width="5" stroke-linecap="round"/>
  <line x1="28" y1="42" x2="44" y2="58" stroke="#ff3c7f" stroke-width="5" stroke-linecap="round"/>
  <line x1="44" y1="42" x2="44" y2="58" stroke="#ff3c7f" stroke-width="5" stroke-linecap="round"/>
  <!-- underscore cursor -->
  <line x1="54" y1="58" x2="72" y2="58" stroke="#ff8c42" stroke-width="4" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </line>
</svg>
