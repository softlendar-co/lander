<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- outer rounded window -->
  <rect x="14" y="14" width="72" height="72" rx="16" fill="none" stroke="#ff8c42" stroke-width="3"/>
  <!-- top bar -->
  <line x1="14" y1="32" x2="86" y2="32" stroke="#ff8c42" stroke-width="2" opacity="0.6"/>
  <!-- traffic dots -->
  <circle cx="26" cy="23" r="3" fill="#ff3c7f"/>
  <circle cx="36" cy="23" r="3" fill="#ff8c42"/>
  <circle cx="46" cy="23" r="3" fill="#ffd54f"/>
  <!-- globe lines -->
  <ellipse cx="50" cy="58" rx="20" ry="14" fill="none" stroke="#ff3c7f" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="44" x2="50" y2="72" stroke="#ff3c7f" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="58" x2="70" y2="58" stroke="#ff3c7f" stroke-width="3" stroke-linecap="round"/>
  <!-- cursor blink -->
  <rect x="60" y="64" width="8" height="3" fill="#ff8c42" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
