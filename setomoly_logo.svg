<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- deep space bg -->
  <rect width="100" height="100" fill="#1a0a2e" rx="50"/>
  <!-- distant stars -->
  <circle cx="20" cy="25" r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="75" cy="18" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="85" cy="45" r="1.5" fill="#ffd54f" opacity="0.7"/>
  <circle cx="15" cy="65" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="80" cy="78" r="1.2" fill="#fff" opacity="0.9"/>
  <circle cx="35" cy="12" r="0.8" fill="#fff" opacity="0.4"/>
  <!-- nebula cloud -->
  <circle cx="50" cy="50" r="28" fill="#ff3c7f" opacity="0.15"/>
  <circle cx="42" cy="44" r="18" fill="#ff8c42" opacity="0.12"/>
  <!-- orbit ring 1 -->
  <ellipse cx="50" cy="50" rx="32" ry="14" fill="none" stroke="#ff8c42" stroke-width="1.5" opacity="0.6" transform="rotate(-20 50 50)"/>
  <!-- orbit ring 2 -->
  <ellipse cx="50" cy="50" rx="36" ry="10" fill="none" stroke="#ff3c7f" stroke-width="1" opacity="0.4" transform="rotate(25 50 50)"/>
  <!-- planet S body -->
  <circle cx="50" cy="50" r="14" fill="#ff8c42"/>
  <circle cx="50" cy="50" r="14" fill="url(#planetGrad)"/>
  <defs>
    <radialGradient id="planetGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ff8c42"/>
    </radialGradient>
  </defs>
  <!-- blue hat brim -->
  <ellipse cx="50" cy="36" rx="10" ry="2.5" fill="#4dabf7" opacity="0.95"/>
  <!-- blue hat top -->
  <rect x="44" y="26" width="12" height="10" rx="2" fill="#4dabf7" opacity="0.95"/>
  <!-- hat band -->
  <rect x="44" y="32" width="12" height="3" fill="#1864ab" opacity="0.9"/>
  <!-- ring around planet -->
  <ellipse cx="50" cy="50" rx="22" ry="5" fill="none" stroke="#fff" stroke-width="2" opacity="0.7" transform="rotate(-15 50 50)"/>
  <!-- small moon -->
  <circle cx="72" cy="38" r="3" fill="#e0d5f0" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
