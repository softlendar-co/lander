<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&amp;display=swap');
      .bg { fill: #B8F0C0; }
      .star { stroke: #F5C518; fill: none; stroke-width: 4; stroke-linecap: round; }
      .star-shadow { stroke: white; fill: none; stroke-width: 4; stroke-linecap: round; }
      .text {
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: 120px;
        fill: #1A2E1A;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>
  </defs>

  <!-- Light green rounded background -->
  <rect class="bg" x="0" y="0" width="500" height="500" rx="80" ry="80"/>

  <!-- Sparkle: Top-left -->
  <g transform="translate(90, 90) scale(0.9)">
    <line class="star-shadow" x1="2" y1="-28" x2="2" y2="32"/>
    <line class="star-shadow" x1="-28" y1="2" x2="32" y2="2"/>
    <circle cx="2" cy="2" r="4" fill="white"/>
    <line class="star" x1="0" y1="-30" x2="0" y2="30"/>
    <line class="star" x1="-30" y1="0" x2="30" y2="0"/>
    <circle cx="0" cy="0" r="4" fill="#F5C518"/>
  </g>

  <!-- Sparkle: Top-right -->
  <g transform="translate(410, 90) scale(0.9)">
    <line class="star-shadow" x1="2" y1="-28" x2="2" y2="32"/>
    <line class="star-shadow" x1="-28" y1="2" x2="32" y2="2"/>
    <circle cx="2" cy="2" r="4" fill="white"/>
    <line class="star" x1="0" y1="-30" x2="0" y2="30"/>
    <line class="star" x1="-30" y1="0" x2="30" y2="0"/>
    <circle cx="0" cy="0" r="4" fill="#F5C518"/>
  </g>

  <!-- Sparkle: Bottom-left -->
  <g transform="translate(90, 410) scale(0.9)">
    <line class="star-shadow" x1="2" y1="-28" x2="2" y2="32"/>
    <line class="star-shadow" x1="-28" y1="2" x2="32" y2="2"/>
    <circle cx="2" cy="2" r="4" fill="white"/>
    <line class="star" x1="0" y1="-30" x2="0" y2="30"/>
    <line class="star" x1="-30" y1="0" x2="30" y2="0"/>
    <circle cx="0" cy="0" r="4" fill="#F5C518"/>
  </g>

  <!-- Sparkle: Bottom-right -->
  <g transform="translate(410, 410) scale(0.9)">
    <line class="star-shadow" x1="2" y1="-28" x2="2" y2="32"/>
    <line class="star-shadow" x1="-28" y1="2" x2="32" y2="2"/>
    <circle cx="2" cy="2" r="4" fill="white"/>
    <line class="star" x1="0" y1="-30" x2="0" y2="30"/>
    <line class="star" x1="-30" y1="0" x2="30" y2="0"/>
    <circle cx="0" cy="0" r="4" fill="#F5C518"/>
  </g>

  <!-- Center text: InD -->
  <text class="text" x="250" y="275">@InD</text>
</svg>
